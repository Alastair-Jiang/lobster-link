# Baseline experiment configuration

experiment:
  name: "euclidean_baseline"
  description: "Euclidean embedding baseline on semantic relations"
  seed: 42

data:
  path: "data/"
  datasets: ["wordnet", "bats", "simlex"]  # datasets to load
  vocab_size: 1000  # will be updated automatically

model:
  geometry: "euclidean"  # euclidean, hyperbolic, spherical
  embedding_dim: 300
  init_scale: 0.01
  manifold_args:
    # Euclidean has no special args
    # For hyperbolic: curvature: -1.0
    # For spherical: radius: 1.0

training:
  optimizer: "adam"
  learning_rate: 0.001
  batch_size: 512
  num_epochs: 50
  negative_samples: 10
  negative_sampler: "uniform"
  loss: "geometric"
  margin: 1.0

evaluation:
  tasks: ["hierarchical", "analogy", "similarity"]
  metrics: ["mean_rank", "map", "spearman"]
  eval_frequency: 5  # epochs

logging:
  log_dir: "results/euclidean_baseline"
  save_checkpoints: true
  checkpoint_frequency: 10  # epochs